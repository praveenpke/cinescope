services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cinescope-postgres
    environment:
      POSTGRES_USER: cinescope
      POSTGRES_PASSWORD: cinescope
      POSTGRES_DB: cinescope
    ports:
      # Host 5433 (5432 is commonly taken) -> container 5432.
      # Matches DATABASE_URL in .env.example.
      - "5433:5432"
    volumes:
      - cinescope_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinescope -d cinescope"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  cinescope_pgdata:
